const UNANSWERED_ANALYSIS_THRESHOLD = 7;

const AI_SYNONYM_MAP = {
  schedule:'jadwal', timetable:'jadwal', agenda:'jadwal', class:'kuliah', lecture:'kuliah', lecturer:'dosen',
  teacher:'dosen', professor:'dosen', prof:'dosen', academic:'akademik', tuition:'ukt', payment:'pembayaran',
  pay:'pembayaran', fee:'ukt', fees:'ukt', course:'mata kuliah', courses:'mata kuliah', assignment:'tugas',
  task:'tugas', exam:'ujian', test:'ujian', thesis:'skripsi', final:'akhir', guidance:'bimbingan',
  consultation:'konsultasi', consult:'konsultasi', letter:'surat', permit:'izin', permission:'izin',
  transcript:'transkrip', grade:'nilai', grades:'nilai', score:'nilai', login:'masuk', account:'akun',
  deadline:'tenggat', due:'tenggat', collect:'kumpul', submit:'kumpul', submission:'pengumpulan',
  administration:'administrasi', admin:'admin', scholarship:'beasiswa', calendar:'jadwal'
};

function normalizeAIText(value) {
  let s = (value || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s@._-]/g,' ')
    .replace(/\s+/g,' ')
    .trim();

  const replacements = [
    ['nggak','tidak'], ['ga','tidak'], ['gak','tidak'], ['tdk','tidak'], ['enggak','tidak'],
    ['gimana','bagaimana'], ['gmna','bagaimana'], ['bgmn','bagaimana'], ['kapan','waktu'],
    ['dimana','lokasi'], ['di mana','lokasi'], ['jadual','jadwal'], ['matkul','mata kuliah'],
    ['siakad','siakad'], ['lms','lms'], ['ukt','ukt'], ['dospem','dosen pembimbing'],
    ['pa','pembimbing akademik'], ['bimbing','bimbingan'], ['krs','krs'], ['khs','khs']
  ];
  replacements.forEach(([a,b]) => {
    s = s.replace(new RegExp(`\\b${a}\\b`, 'g'), b);
  });

  s = s.split(' ').map(w => AI_SYNONYM_MAP[w] || w)
    .map(w => w.replace(/(nya|lah|kah|pun)$/,'').replace(/(kan|an|ing|ed|s)$/,''))
    .filter(Boolean)
    .join(' ');
  return s;
}

function aiTokens(value) {
  return normalizeAIText(value).split(' ').filter(w => w.length > 2);
}

function aiSimilarity(a,b) {
  const na = normalizeAIText(a);
  const nb = normalizeAIText(b);
  if(!na || !nb) return 0;
  if(na === nb) return 1;
  if(na.includes(nb) || nb.includes(na)) return 0.92;
  const A = new Set(na.split(' ').filter(w=>w.length>2));
  const B = new Set(nb.split(' ').filter(w=>w.length>2));
  if(A.size === 0 || B.size === 0) return 0;
  let inter = 0;
  A.forEach(w => {
    if(B.has(w)) inter++;
    else {
      for(const bw of B) {
        if((w.length > 4 && bw.includes(w)) || (bw.length > 4 && w.includes(bw))) { inter += .75; break; }
      }
    }
  });
  const union = Math.max(A.size, B.size);
  return inter / union;
}

function findBestKnowledgeMatch(kbRows, question) {
  let best = null;
  let bestScore = 0;
  (kbRows || []).forEach(k => {
    const scoreQ = aiSimilarity(question, k.question || '');
    const scoreA = aiSimilarity(question, k.answer || '') * 0.35;
    const score = Math.max(scoreQ, scoreA);
    if(score > bestScore) { bestScore = score; best = k; }
  });
  return bestScore >= 0.42 ? best : null;
}

function applyUnansweredOwnerFilter(query, ownerId) {
  return ownerId ? query.eq('owner_id', ownerId) : query.is('owner_id', null);
}

function isScheduleQuestion(question) {
  const n = normalizeAIText(question);
  const tokens = ['jadwal','kuliah','mengajar','bimbingan','konsultasi','bertemu','temu','waktu','agenda','kelas','kosong'];
  return tokens.some(t => n.includes(t));
}

async function findLecturerForSchedule(question, explicitOwnerId=null) {
  if(explicitOwnerId) {
    const {data:p} = await sb.from('profiles').select('id,full_name,email,nidn,role').eq('id', explicitOwnerId).maybeSingle();
    if(p && p.role === 'dosen') return p;
  }
  const {data:lecturers} = await sb.from('profiles').select('id,full_name,email,nidn,role').eq('role','dosen').limit(300);
  const qNorm = normalizeAIText(question);
  let best = null, score = 0;
  (lecturers || []).forEach(d => {
    const name = [d.full_name, d.email, d.nidn].filter(Boolean).join(' ');
    const s = aiSimilarity(qNorm, name);
    const nameTokens = aiTokens(d.full_name || '');
    const tokenHit = nameTokens.length ? nameTokens.filter(t=>qNorm.includes(t)).length / nameTokens.length : 0;
    const finalScore = Math.max(s, tokenHit);
    if(finalScore > score) { score = finalScore; best = d; }
  });
  return score >= 0.34 ? best : null;
}

async function getLecturerScheduleAnswer(question, explicitOwnerId=null) {
  if(!isScheduleQuestion(question)) return null;
  const lecturer = await findLecturerForSchedule(question, explicitOwnerId);
  if(!lecturer) {
    return 'Saya bisa membantu melihat jadwal dosen, tetapi sebutkan nama dosennya dulu ya. Contoh: "Jadwal Bu Rina minggu ini kapan?"';
  }
  const now = new Date().toISOString();
  const {data:schedules, error} = await sb.from('schedule_events')
    .select('title,category,start_time,end_time,location,is_busy,deleted_at')
    .eq('user_id', lecturer.id)
    .is('deleted_at', null)
    .gte('start_time', now)
    .order('start_time', {ascending:true})
    .limit(5);

  if(error) return null;
  if(!schedules || schedules.length === 0) {
    return `Belum ada jadwal mendatang yang tercatat untuk ${lecturer.full_name || 'dosen tersebut'}.`;
  }
  const rows = schedules.map((s,i) => {
    const loc = s.location ? ` di ${s.location}` : '';
    const cat = s.category ? ` (${s.category})` : '';
    return `${i+1}. ${fmtDt(s.start_time)}–${fmtTime(s.end_time)}: ${s.title || 'Jadwal'}${cat}${loc}`;
  }).join('\n');
  return `Jadwal terdekat ${lecturer.full_name || 'dosen tersebut'}:\n${rows}\n\nCatatan: informasi ini mengikuti jadwal yang tercatat di HaloKampus.`;
}

async function triggerAIResponse(requestId, userMsg) {
  const {data:req} = await sb.from('requests').select('recipient_id,recipient_type').eq('id',requestId).single();
  if(!req) return;

  let ownerId = req.recipient_id;
  let scope = 'personal';
  if(req.recipient_type === 'admin') { scope = 'admin_group'; ownerId = null; }

  const scheduleAnswer = await getLecturerScheduleAnswer(userMsg, ownerId);
  if(scheduleAnswer) {
    await sb.from('request_messages').insert({request_id:requestId,sender_type:'ai_bot',ai_owner_id:ownerId||null,message:scheduleAnswer});
    return;
  }

  let kbQ = sb.from('ai_knowledge_base').select('question,answer,category,owner_id,owner_scope').eq('is_active',true);
  if(scope === 'admin_group') kbQ = kbQ.eq('owner_scope','admin_group');
  else if(ownerId) kbQ = kbQ.eq('owner_id',ownerId).eq('owner_scope','personal');

  const {data:kb} = await kbQ;
  const match = findBestKnowledgeMatch(kb || [], userMsg);

  if(!match) {
    await saveUnanswered(requestId, userMsg, ownerId || null);
    return;
  }

  await sb.from('request_messages').insert({request_id:requestId,sender_type:'ai_bot',ai_owner_id:ownerId||null,message:match.answer});
  const notifTarget = req.recipient_id || null;
  if(notifTarget) {
    await sb.from('notifications').insert({user_id:notifTarget,request_id:requestId,title:'Bot AI Menjawab',body:`Bot AI menjawab pertanyaan pada request. Silakan tinjau jika diperlukan.`,type:'ai_response'});
  }
}

async function saveUnanswered(requestId, question, ownerId) {
  const normalized = normalizeAIText(question);
  let q = sb.from('unanswered_ai_questions')
    .select('id,question,asked_count,normalized_question')
    .limit(200);
  q = applyUnansweredOwnerFilter(q, ownerId || null);
  const {data:rows} = await q;

  let match = null;
  let best = 0;
  (rows || []).forEach(r => {
    const score = Math.max(
      aiSimilarity(question, r.question || ''),
      aiSimilarity(normalized, r.normalized_question || '')
    );
    if(score > best) { best = score; match = r; }
  });

  if(match && best >= 0.62) {
    const nextCount = (Number(match.asked_count) || 1) + 1;
    await sb.from('unanswered_ai_questions')
      .update({
        asked_count: nextCount,
        normalized_question: match.normalized_question || normalized,
        should_display: nextCount >= UNANSWERED_ANALYSIS_THRESHOLD,
        last_asked_at: new Date().toISOString(),
        request_id: requestId || null
      })
      .eq('id', match.id);
  } else {
    await sb.from('unanswered_ai_questions').insert({
      question,
      normalized_question: normalized,
      owner_id: ownerId || null,
      request_id: requestId || null,
      asked_count: 1,
      should_display: false,
      first_asked_at: new Date().toISOString(),
      last_asked_at: new Date().toISOString()
    });
  }
}

  const inp = $('ai-input'); const msgs = $('ai-messages'); const btn = $('ai-send-btn');
  if(!inp||!msgs||!inp.value.trim()||!currentUser) return;
  const q = inp.value.trim(); inp.value='';
  if(btn) btn.disabled = true;
  try {
    const {error:e1} = await sb.from('ai_bot_chat_history').insert({user_id:currentUser.id,sender_type:'user',message:q});
    if(e1) { showToast('Gagal menyimpan pesan: '+getErrorMessage(e1),'error'); inp.value=q; return; }

    let answer = await getLecturerScheduleAnswer(q, null);
    if(!answer) {
      const {data:kb} = await sb.from('ai_knowledge_base').select('question,answer,category,owner_id,owner_scope').eq('is_active',true).limit(500);
      const match = findBestKnowledgeMatch(kb || [], q);
      if(match) {
        answer = match.answer;
      } else {
        answer = 'Pertanyaan ini belum tersedia di database AI dan akan menjadi bahan evaluasi jika banyak mahasiswa menanyakan hal serupa. Silakan hubungi dosen atau admin terkait melalui Request Chat.';
        await saveUnanswered(null, q, null);

    const {error:e2} = await sb.from('ai_bot_chat_history').insert({user_id:currentUser.id,sender_type:'bot',message:answer});

    await loadBotChatHistory();
  } catch(err) {
    showToast('Bot gagal menjawab: '+getErrorMessage(err), 'error');
  } finally {
    if(btn) btn.disabled = false;
  }
};

window.editSchedule = function(s) {

  $('sched-start').value=new Date(s.start_time).toISOString().slice(0,16);
  $('sched-end').value=new Date(s.end_time).toISOString().slice(0,16);

window.saveSchedule = async function(e) {
  e.preventDefault();
  const id=$('sched-id').value;
  const payload={user_id:currentUser.id,title:$('sched-title').value,category:$('sched-cat')?.value,start_time:new Date($('sched-start').value).toISOString(),end_time:new Date($('sched-end').value).toISOString(),location:$('sched-loc').value,description:$('sched-desc').value,reminder_minutes:parseInt($('sched-reminder').value)||30,is_busy:$('sched-busy').checked};
  if(new Date(payload.start_time)>=new Date(payload.end_time)){if($('sched-error')){$('sched-error').classList.remove('hidden');$('sched-error').textContent='Waktu selesai harus setelah waktu mulai.';}return;}

window.deleteSchedule = async function(id) {

    deleted_by:currentUser.id,
    trash_expires_at:plusDaysIso(new Date(),30)
  }).eq('id',id).eq('user_id',currentUser.id);

// TO-DO LIST / CHECKLIST JADWAL
// ============================================================
async function loadTodos() {
  const list = $('todo-list');
  const summary = $('todo-summary');
  if(!list || !currentUser) return;
  const {data,error} = await sb.from('schedule_todos').select('*').eq('user_id',currentUser.id).is('deleted_at',null).order('created_at',{ascending:false});
  if(error) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${getErrorMessage(error)}</p></div>`;
    return;
  }
  window._todos = data || [];
  const total = window._todos.length;
  const done = window._todos.filter(t=>t.is_completed).length;
  const pending = total - done;
  if(summary) summary.innerHTML = `
    <span class="badge badge-blue">Total: ${total}</span>
    <span class="badge badge-yellow">Belum selesai: ${pending}</span>
    <span class="badge badge-green">Selesai: ${done}</span>`;
  renderTodoList();
}

function renderTodoList() {
  const list = $('todo-list');
  if(!list) return;
  let rows = window._todos || [];
  if(todoFilter==='belum') rows = rows.filter(t=>!t.is_completed);
  if(todoFilter==='selesai') rows = rows.filter(t=>t.is_completed);
  ['semua','belum','selesai'].forEach(f=>{
    const btn = $('todo-filter-'+f);
    if(btn) btn.classList.toggle('active', todoFilter===f);
  });
  if(rows.length===0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><p>Belum ada daftar kegiatan. Tambahkan tugas atau kegiatan pertama Anda.</p></div>`;
    return;
  }
  list.innerHTML = rows.map(t=>`
    <div class="todo-item ${t.is_completed?'completed':''}">
      <input class="todo-check" type="checkbox" ${t.is_completed?'checked':''} onchange="toggleTodo('${t.id}',this.checked)"/>
      <div style="flex:1;min-width:0">
        <div class="todo-title">${escapeHtml(t.title)}</div>
        ${t.description?`<div style="font-size:.82rem;color:var(--text-gray);line-height:1.5;margin-top:.25rem">${escapeHtml(t.description)}</div>`:''}
        <div class="todo-meta">${t.due_date?'📅 '+fmtDt(t.due_date):'Tanpa tenggat'}${t.category?' · 📁 '+escapeHtml(t.category):''}</div>
      </div>
      <div class="todo-actions">
        <button type="button" class="btn btn-ghost btn-sm" onclick="editTodo('${t.id}')">✏️</button>
        <button type="button" class="btn btn-danger btn-sm" onclick="deleteTodo('${t.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

window.setTodoFilter = function(f) {
  todoFilter = f;
  renderTodoList();
};

window.addTodo = async function(e) {
  e.preventDefault();
  const title = $('todo-title')?.value.trim();
  if(!title) return;
  const payload = {
    user_id: currentUser.id,
    title,
    description: $('todo-desc')?.value.trim() || null,
    due_date: $('todo-due')?.value ? new Date($('todo-due').value).toISOString() : null,
    category: $('todo-cat')?.value.trim() || null,
    is_completed:false
  };
  const {error} = await sb.from('schedule_todos').insert(payload);
  if(error) { showToast('Gagal tambah to-do: '+getErrorMessage(error),'error'); return; }
  ['todo-title','todo-desc','todo-due','todo-cat'].forEach(id=>{ if($(id)) $(id).value=''; });
  showToast('To-do ditambahkan.', 'success');
  await loadTodos();
};

window.toggleTodo = async function(id, checked) {
  const {error} = await sb.from('schedule_todos').update({
    is_completed: checked,
    completed_at: checked ? new Date().toISOString() : null
  }).eq('id',id).eq('user_id',currentUser.id);
  if(error) { showToast('Gagal update to-do: '+getErrorMessage(error),'error'); return; }
  await loadTodos();
};

window.editTodo = async function(id) {
  const t = (window._todos||[]).find(x=>x.id===id);
  if(!t) return;
  const title = prompt('Edit judul kegiatan:', t.title || '');
  if(title === null) return;
  const clean = title.trim();
  if(!clean) { showToast('Judul tidak boleh kosong.', 'error'); return; }
  const desc = prompt('Edit deskripsi (boleh kosong):', t.description || '');
  if(desc === null) return;
  const category = prompt('Edit kategori (boleh kosong):', t.category || '');
  if(category === null) return;
  const {error} = await sb.from('schedule_todos').update({
    title: clean,
    description: desc.trim() || null,
    category: category.trim() || null
  }).eq('id',id).eq('user_id',currentUser.id);
  if(error) { showToast('Gagal edit to-do: '+getErrorMessage(error),'error'); return; }
  showToast('To-do diperbarui.', 'success');
  await loadTodos();
};

window.deleteTodo = async function(id) {
  if(!confirm('Hapus kegiatan/tugas ini?')) return;
  const {error} = await sb.from('schedule_todos').update({
    deleted_at:new Date().toISOString(),
    deleted_by:currentUser.id
  }).eq('id',id).eq('user_id',currentUser.id);
  if(error) { showToast('Gagal hapus to-do: '+getErrorMessage(error),'error'); return; }
  showToast('To-do dihapus.', 'success');
  await loadTodos();
};

  } else {
    const [sent,inbox] = await Promise.all([
      sb.from('requests').select('*,sender:profiles!requests_sender_id_fkey(full_name,role,nim,nidn,fakultas,program_studi),recipient:profiles!requests_recipient_id_fkey(full_name,role,nim,nidn,fakultas,program_studi)').eq('sender_id',uid).eq('status','selesai'),
      sb.from('requests').select('*,sender:profiles!requests_sender_id_fkey(full_name,role,nim,nidn,fakultas,program_studi),recipient:profiles!requests_recipient_id_fkey(full_name,role,nim,nidn,fakultas,program_studi)').eq('recipient_id',uid).eq('status','selesai')

// ============================================================
// MONITORING
// ============================================================
async function renderMonitoring(body) {
  const uid=currentUser.id; const role=currentProfile.role;
  let q;
  if(role==='admin') q=sb.from('requests').select('category,status,priority,created_at').eq('recipient_type','admin');
  else q=sb.from('requests').select('category,status,priority,created_at').eq('recipient_id',uid);
  const {data:reqs}=await q;
  const all=onlyActiveRequests(excludeTrashed(reqs||[]));
  const catCount={};
  all.forEach(r=>{catCount[r.category]=(catCount[r.category]||0)+1;});
  const cats=Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a]);
  const topCat=cats[0]||'—';
  const lateReqs=all.filter(r=>r.status==='terlambat');
  const lateCatCount={};
  lateReqs.forEach(r=>{lateCatCount[r.category]=(lateCatCount[r.category]||0)+1;});
  const topLateCat=Object.keys(lateCatCount).sort((a,b)=>lateCatCount[b]-lateCatCount[a])[0]||'—';
  const pending=all.filter(r=>r.status==='menunggu_diproses'||r.status==='belum_diproses').length;
  body.innerHTML=`
    <div class="section-header"><h2>Monitoring</h2></div>
    <div class="stats-grid" style="margin-bottom:1.75rem">
      ${statCard('📋','Total Request',all.length,'var(--blue-soft)','var(--blue)')}
      ${statCard('✅','Selesai',all.filter(r=>r.status==='selesai').length,'var(--green-soft)','var(--green)')}
      ${statCard('⏱️','Terlambat',lateReqs.length,'#FEE2E2','var(--red)')}
      ${statCard('⏳','Menunggu',pending,'#FEF9C3','#854D0E')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
      <div class="chart-wrap">
        <h4 class="chart-title">Request per Kategori</h4>
        <canvas id="cat-chart" height="250"></canvas>
      </div>
      <div class="card">
        <h4 style="font-weight:700;margin-bottom:1rem">Analisis Otomatis</h4>
        <div style="font-size:.875rem;line-height:1.7;color:var(--text-gray)">
          ${all.length===0?'<p>Belum ada data request untuk dianalisis.</p>':`
          <p>📊 <strong>Kategori terbanyak:</strong> ${topCat} (${catCount[topCat]||0} request)</p><br>
          ${role==='admin'?`<p>⚠️ <strong>Kategori terlambat terbanyak:</strong> ${topLateCat} (${lateCatCount[topLateCat]||0} request)</p><br>`:''}
          <p>🔄 <strong>Bottleneck:</strong> ${pending} request masih menunggu diproses.</p><br>
          <p>💡 <strong>Saran:</strong> ${pending>5?`Kategori ${topCat} memiliki antrian tinggi. Pertimbangkan penambahan kapasitas atau percepatan respons.`:'Performa layanan dalam kondisi baik. Pertahankan waktu respons yang cepat.'}</p>`}
        </div>
      </div>
    </div>`;
  if(cats.length>0) {
    const ctx=document.getElementById('cat-chart')?.getContext('2d');
    if(ctx) new Chart(ctx,{type:'doughnut',data:{labels:cats,datasets:[{data:cats.map(c=>catCount[c]),backgroundColor:['#2563EB','#16A34A','#EA580C','#7C3AED','#DB2777','#0891B2','#854D0E','#374151','#065F46','#1E40AF','#9F1239']}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}}}}});
  }
}

// INTERVALS
// ============================================================
function startIntervals() {
  if(notifInterval) clearInterval(notifInterval);
  if(followupInterval) clearInterval(followupInterval);
  if(reminderInterval) clearInterval(reminderInterval);
  notifInterval=setInterval(()=>loadNotifCount(),60000);
  followupInterval=setInterval(()=>checkFollowup(),300000);
  reminderInterval=setInterval(()=>checkReminders(),60000);
  setTimeout(()=>{checkFollowup();checkReminders();},3000);
}
function stopIntervals(){
  if(notifInterval)clearInterval(notifInterval);
  if(followupInterval)clearInterval(followupInterval);
  if(reminderInterval)clearInterval(reminderInterval);
  notifInterval=null;followupInterval=null;reminderInterval=null;
}
async function checkFollowup(){
  if(!currentUser) return;
  const uid=currentUser.id;
  const {data}=await sb.from('requests').select('id,request_code,subject,due_date,status,sender_id').eq('sender_id',uid).not('status','in','("selesai","terlambat")');
  if(!data) return;
  const now=new Date();
  for(const r of data){
    const due=new Date(r.due_date);
    if(due<now){
      await sb.from('requests').update({status:'terlambat'}).eq('id',r.id).neq('status','selesai').neq('status','terlambat');
      await sb.from('notifications').insert({user_id:uid,request_id:r.id,title:'Request Terlambat',body:`Request ${r.request_code}: "${r.subject}" telah melewati tenggat waktu.`,type:'overdue'});
    } else if((due-now)<86400000){
      const {data:ex}=await sb.from('notifications').select('id').eq('user_id',uid).eq('request_id',r.id).eq('type','deadline_soon').gte('created_at',new Date(now.getTime()-3600000).toISOString()).maybeSingle();
      if(!ex) await sb.from('notifications').insert({user_id:uid,request_id:r.id,title:'Request Mendekati Tenggat',body:`Request ${r.request_code}: "${r.subject}" akan jatuh tempo dalam kurang dari 24 jam.`,type:'deadline_soon'});
    }
  }
}
async function checkReminders(){
  if(!currentUser) return;
  const now=new Date();
  const soon=new Date(now.getTime()+60*60000).toISOString();
  const {data}=await sb.from('schedule_events').select('*').eq('user_id',currentUser.id).eq('reminder_sent',false).gte('start_time',now.toISOString()).lte('start_time',soon);
  if(!data) return;
  for(const s of data){
    const diff=Math.round((new Date(s.start_time)-now)/60000);
    if(diff<=s.reminder_minutes){
      await sb.from('notifications').insert({user_id:currentUser.id,title:'Pengingat Jadwal',body:`Jadwal "${s.title}" akan dimulai dalam ${diff} menit.`,type:'schedule_reminder'});
      await sb.from('schedule_events').update({reminder_sent:true}).eq('id',s.id);
      showToast(`⏰ ${s.title} dalam ${diff} menit!`,'info',7000);
    }
  }
}

function closeGlobalSearch() {

async function performGlobalSearch(raw) {
  const term = (raw || '').trim().toLowerCase();
  closeGlobalSearch();
  const input = $('topbar-search');
  if(!input || term.length < 2 || !currentUser) return;

  const box = document.createElement('div');
  box.id = 'global-search-dropdown';
  box.className = 'global-search-dropdown';
  input.parentElement.appendChild(box);
  box.innerHTML = `<div class="global-search-item"><div class="global-search-title">Mencari...</div></div>`;

  try {
    const uid = currentUser.id;
    const role = currentProfile.role;
    let results = [];

    let reqQ = sb.from('requests')
      .select('id,request_code,subject,description,category,status,deleted_at,sender_id,recipient_id,recipient_type,sender:profiles!requests_sender_id_fkey(full_name,email),recipient:profiles!requests_recipient_id_fkey(full_name,email)')
      .limit(50);
    if(role==='admin') reqQ = applyAdminRequestFilter(reqQ, uid);
    else reqQ = reqQ.or(`sender_id.eq.${uid},recipient_id.eq.${uid}`);
    const {data:reqs} = await reqQ;
    (reqs||[]).filter(r=>{
      const hay = [r.request_code,r.subject,r.description,r.category,r.status,r.sender?.full_name,r.sender?.email,r.recipient?.full_name,r.recipient?.email].join(' ').toLowerCase();
      return hay.includes(term);
    }).slice(0,8).forEach(r=>results.push({
      type: r.status==='selesai'?'Riwayat Chat':'Request',
      title: `${r.request_code||'—'} · ${r.subject||'Request'}`,
      sub: `${r.category||'—'} · ${statusLabel(r.status)}`,
      action: `openChat('${r.id}')`
    }));

    const {data:schedules} = await sb.from('schedule_events').select('id,title,description,category,location,start_time,deleted_at').eq('user_id',uid).is('deleted_at',null).limit(50);
    (schedules||[]).filter(s=>[s.title,s.description,s.category,s.location].join(' ').toLowerCase().includes(term)).slice(0,5).forEach(s=>results.push({
      type:'Jadwal',
      title:s.title,
      sub:`${s.category||'—'} · ${fmtDt(s.start_time)}`,
      action:`navTo('jadwal')`
    }));

    const {data:todos} = await sb.from('schedule_todos').select('id,title,description,category,due_date,is_completed,deleted_at').eq('user_id',uid).is('deleted_at',null).limit(50);
    (todos||[]).filter(t=>[t.title,t.description,t.category].join(' ').toLowerCase().includes(term)).slice(0,5).forEach(t=>results.push({
      type:'To-do',
      title:t.title,
      sub:`${t.category||'—'} · ${t.is_completed?'Selesai':'Belum selesai'}`,
      action:`navTo('jadwal')`
    }));

    if(role==='mahasiswa') {
      const {data:botRows} = await sb.from('ai_bot_chat_history').select('id,message,sender_type,created_at').eq('user_id',uid).limit(50);
      (botRows||[]).filter(b=>(b.message||'').toLowerCase().includes(term)).slice(0,5).forEach(b=>results.push({
        type:'Bot',
        title:b.sender_type==='user'?'Pertanyaan Anda':'Jawaban Bot',
        sub:(b.message||'').slice(0,120),
        action:`navTo('bot-ai')`
      }));
    }

    if(results.length===0) {
      box.innerHTML = `<div class="global-search-item"><div class="global-search-title">Tidak ada hasil yang cocok.</div></div>`;
      return;
    }
    box.innerHTML = results.slice(0,15).map(r=>`
      <div class="global-search-item" onclick="closeGlobalSearch();${r.action}">
        <div class="global-search-type">${escapeHtml(r.type)}</div>
        <div class="global-search-title">${escapeHtml(r.title)}</div>
        <div class="global-search-sub">${escapeHtml(r.sub||'')}</div>
      </div>`).join('');
  } catch(err) {
    box.innerHTML = `<div class="global-search-item"><div class="global-search-title">Gagal mencari</div><div class="global-search-sub">${getErrorMessage(err)}</div></div>`;
  }
}

// ============================================================
// FINAL NOTIFICATION CLEANUP PATCH — deleted/cancelled benar-benar hilang dari notif
// ============================================================
function requestHiddenFromNotification(req) {
  return !req || req.status === 'dibatalkan' || !!req.deleted_at;
}

async function getRequestForNotifGuard(requestId) {
  if(!requestId || requestId === 'null' || requestId === 'undefined') return null;
  const {data, error} = await sb.from('requests')
    .select('id,status,deleted_at,sender_id,recipient_id,recipient_type')
    .eq('id', requestId)
    .maybeSingle();
  if(error) return null;
  return data || null;
}

async function cleanupNotificationsForHiddenRequest(requestId) {
  if(!currentUser || !requestId) return;
  try {
    await sb.from('notifications')
      .delete()
      .eq('user_id', currentUser.id)
      .eq('request_id', requestId);
  } catch(e) {
    console.warn('cleanup notif skipped', e);
  }
}

async function cleanupMessageNotificationsForRequest(requestId) {
  if(!currentUser || !requestId) return;
  try {
    await sb.from('notifications')
      .delete()
      .eq('user_id', currentUser.id)
      .eq('request_id', requestId)
      .or('type.in.(new_message,message,request_message,chat_message,ai_response),title.ilike.%pesan%,body.ilike.%pesan%,title.ilike.%chat%,body.ilike.%chat%');
  } catch(e) {
    console.warn('cleanup message notif skipped', e);
  }
}

async function filterVisibleNotifications(notifs) {
  const rows = (notifs || []).filter(Boolean);
  const requestIds = [...new Set(rows.map(n => n.request_id).filter(id => id && id !== 'null' && id !== 'undefined'))];
  if(requestIds.length === 0) return rows;

  const {data:reqs} = await sb.from('requests')
    .select('id,status,deleted_at')
    .in('id', requestIds);
  const reqMap = Object.fromEntries((reqs || []).map(r => [r.id, r]));
  const hiddenIds = requestIds.filter(id => requestHiddenFromNotification(reqMap[id]));

  if(hiddenIds.length) {
    try {
      await sb.from('notifications')
        .delete()
        .eq('user_id', currentUser.id)
        .in('request_id', hiddenIds);
    } catch(e) {
      console.warn('stale notif delete skipped', e);
    }
  }

  return rows.filter(n => {
    if(!n.request_id) return true;
    return !hiddenIds.includes(n.request_id);
  });
}

  if(!confirm('Batalkan dan hapus request ini dari penerima? Request akan masuk ke Sampah Anda dan tidak muncul lagi di notifikasi penerima.')) return;
  const {data:req} = await sb.from('requests')
    .select('id,status')
    .eq('id', id)
    .eq('sender_id', currentUser.id)
    .maybeSingle();

  const nowIso = new Date().toISOString();
  const payload = {
    status: 'dibatalkan',
    deleted_at: nowIso,
    deleted_by: currentUser.id,
    cancelled_at: nowIso,
    cancelled_by: currentUser.id,
    previous_status: req?.status || null,
    trash_expires_at: plusDaysIso(nowIso, 30)
  };

  const {error} = await sb.from('requests')
    .update(payload)
    .eq('id', id)
    .eq('sender_id', currentUser.id);

  if(error){showToast('Gagal membatalkan: '+getErrorMessage(error),'error');return;}
  await cleanupNotificationsForHiddenRequest(id);
  showToast('Request dibatalkan dan disembunyikan dari penerima.','success');
  loadDashPage(currentDashPage);
};

    .select('*')

// Override: klik notif lama dicek dulu. Kalau request sudah deleted/dibatalkan, tidak dibuka.
window.onNotifClick = async function(nid,rid){
  await sb.from('notifications').update({is_read:true}).eq('id',nid).eq('user_id',currentUser.id);
  closeNotifDropdown(); loadNotifCount();
  if(rid && rid !== 'null' && rid !== 'undefined') {
    const req = await getRequestForNotifGuard(rid);
    if(requestHiddenFromNotification(req)) {
      await cleanupNotificationsForHiddenRequest(rid);
      showToast('Notifikasi ini sudah tidak berlaku karena request sudah dihapus/dibatalkan.', 'info');
      return;
    }
    openChat(rid);
  }

// Override: realtime tidak menampilkan toast/browser notif untuk request yang sudah hidden.
setupRealtime = function() {
  realtimeSubs.forEach(s=>sb.removeChannel(s));
  realtimeSubs=[];
  const ch=sb.channel('notif-realtime-'+currentUser.id)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:`user_id=eq.${currentUser.id}`},async payload=>{
      const n=payload.new;
      if(n?.request_id) {
        const req = await getRequestForNotifGuard(n.request_id);
        if(requestHiddenFromNotification(req)) {
          await cleanupNotificationsForHiddenRequest(n.request_id);
          await loadNotifCount();
          return;
        }
      }
      await loadNotifCount();
      showToast((n.title||'Notifikasi')+(n.body?': '+String(n.body).slice(0,60):''),'info',5000);
      if(Notification.permission==='granted')new Notification('HaloKampus!',{body:n.title||'Notifikasi baru',icon:''});
    }).subscribe();
  realtimeSubs.push(ch);
};

// Override: follow-up/deadline notif hanya untuk request aktif yang belum deleted/dibatalkan.
checkFollowup = async function(){
  if(!currentUser) return;
  const uid=currentUser.id;
  const {data}=await sb.from('requests')
    .select('id,request_code,subject,due_date,status,sender_id,deleted_at')
    .eq('sender_id',uid)
    .is('deleted_at', null)
    .in('status', ACTIVE_REQUEST_STATUSES)
    .not('due_date','is',null);
  if(!data) return;
  const now=new Date();
  for(const r of data){
    if(!isActiveRequest(r)) continue;
    const due=new Date(r.due_date);
    if(Number.isNaN(due.getTime())) continue;
    if(due<now){
      await sb.from('requests')
        .update({status:'terlambat'})
        .eq('id',r.id)
        .is('deleted_at', null)
        .neq('status','selesai')
        .neq('status','dibatalkan')
        .neq('status','terlambat');
      const {data:ex}=await sb.from('notifications').select('id')
        .eq('user_id',uid).eq('request_id',r.id).eq('type','overdue')
        .gte('created_at',new Date(now.getTime()-3600000).toISOString()).maybeSingle();
      if(!ex) await sb.from('notifications').insert({user_id:uid,request_id:r.id,title:'Request Terlambat',body:`Request ${r.request_code}: "${r.subject}" telah melewati tenggat waktu.`,type:'overdue'});
    } else if((due-now)<86400000){
      const {data:ex}=await sb.from('notifications').select('id')
        .eq('user_id',uid).eq('request_id',r.id).eq('type','deadline_soon')
        .gte('created_at',new Date(now.getTime()-3600000).toISOString()).maybeSingle();
      if(!ex) await sb.from('notifications').insert({user_id:uid,request_id:r.id,title:'Request Mendekati Tenggat',body:`Request ${r.request_code}: "${r.subject}" akan jatuh tempo dalam kurang dari 24 jam.`,type:'deadline_soon'});
    }
  }
};

// Helper update request yang aman kalau schema cache Supabase belum baca kolom baru.
function hkMissingColumnFromError(error) {
  const msg = getErrorMessage(error || {}).toLowerCase();
  const m = msg.match(/'([^']+)'\s+column/) || msg.match(/column\s+"?([a-zA-Z0-9_]+)"?/);
  return m ? m[1] : '';
}
async function hkSafeUpdateRequest(id, payload, filters = {}) {
  let clean = {...payload};
  for(let attempt=0; attempt<5; attempt++){
    let q = sb.from('requests').update(clean).eq('id', id);
    Object.entries(filters || {}).forEach(([k,v]) => {
      if(v === null) q = q.is(k, null);
      else q = q.eq(k, v);
    });
    const {error} = await q;
    if(!error) return {error:null};
    const missing = hkMissingColumnFromError(error);
    if(missing && Object.prototype.hasOwnProperty.call(clean, missing)) {
      delete clean[missing];
      continue;
    }
    return {error};
  }
  return {error:null};
}
function hkSelectRequestFullForSent() {
  return '*,sender:profiles!requests_sender_id_fkey(full_name,role,nim,nidn,fakultas,program_studi),recipient:profiles!requests_recipient_id_fkey(full_name,role,nim,nidn,fakultas,program_studi)';
}
function hkDedupeRequests(rows) {
  const map = new Map();
  (rows || []).filter(Boolean).forEach(r => {
    if(r?.id && !map.has(r.id)) map.set(r.id, r);
  });
  return [...map.values()];
}
async function hkFetchRelatedRequests({activeOnly=false, completedOnly=false, includeTrash=false, limit=null, minimal=false} = {}) {
  const uid = currentUser?.id;
  const role = currentProfile?.role;
  const selectFull = minimal ? 'id,status,priority,deleted_at,category,sender_id,recipient_id,recipient_type' : hkSelectRequestFullForSent();
  let queries = [];
  if(role === 'admin') {
    queries.push(applyAdminRequestFilter(sb.from('requests').select(selectFull), uid).order('created_at',{ascending:false}));
    queries.push(sb.from('requests').select(selectFull).eq('sender_id', uid).order('created_at',{ascending:false}));
  } else {
    queries.push(sb.from('requests').select(selectFull).eq('sender_id', uid).order('created_at',{ascending:false}));
    queries.push(sb.from('requests').select(selectFull).eq('recipient_id', uid).order('created_at',{ascending:false}));
  }
  const results = await Promise.all(queries);
  const firstErr = results.find(r => r.error)?.error;
  let rows = hkDedupeRequests(results.flatMap(r => r.data || []));
  if(!includeTrash) rows = excludeTrashed(rows);
  if(activeOnly) rows = onlyActiveRequests(rows);
  if(completedOnly) rows = onlyCompletedRequests(rows);
  rows = sortRequests(rows);
  if(limit) rows = rows.slice(0, limit);
  return {data: rows, error: firstErr || null};
}

// FIX 1 — status bisa diubah ke semua status tanpa error reopened_at.
window.updateStatus = async function(id, status) {
  const payload = {status};
  if(status === 'selesai') {
    payload.completed_at = new Date().toISOString();
  } else if(ACTIVE_REQUEST_STATUSES.includes(status)) {
    payload.completed_at = null;
    // tidak wajib; kalau kolom belum ada akan otomatis dibuang oleh hkSafeUpdateRequest
    payload.reopened_at = null;
  }
  const {error} = await hkSafeUpdateRequest(id, payload);
  if(error) { showToast('Gagal update status: '+getErrorMessage(error),'error'); return; }

  // Kalau selesai, bersihkan notif prioritas/deadline lama agar tidak muncul lagi di aktif.
  if(status === 'selesai') {
    try {
      await sb.from('notifications')
        .delete()
        .eq('request_id', id)
        .in('type', ['deadline_soon','overdue','priority','request_priority']);
    } catch(e) {}
  }

  showToast('Status diperbarui!','success');
  if(openRequestId===id && status !== 'selesai') openChat(id);
  else loadDashPage(status==='selesai' ? 'riwayat' : currentDashPage);
};

// FIX reopen 7 hari, tapi aman kalau kolom reopened_at belum terbaca.
maybeReopenRequestOnNewMessage = async function(requestId) {
  const {data:req,error} = await sb.from('requests').select('id,status,completed_at,priority,deleted_at').eq('id',requestId).maybeSingle();
  if(error || !req || requestHiddenFromNotification(req) || req.status!=='selesai' || !req.completed_at) return;
  const diffMs = Date.now() - new Date(req.completed_at).getTime();
  const sevenDaysMs = 7*24*60*60*1000;
  if(diffMs <= sevenDaysMs) {
    await hkSafeUpdateRequest(requestId, {
      status:'menunggu_diproses',
      completed_at:null,
      reopened_at:new Date().toISOString(),
      priority:'urgent'
    });
  }
};

// FIX 2 — request yang dihapus masuk Sampah Request dan hilang dari penerima/notif.
window.cancelRequest = async function(id) {
  if(!confirm('Hapus/batalkan request ini? Request akan masuk ke Sampah Anda dan hilang dari tampilan serta notifikasi penerima.')) return;
  const {data:req} = await sb.from('requests')
    .select('id,status,sender_id')
    .eq('id', id)
    .maybeSingle();
  const nowIso = new Date().toISOString();
  const payload = {
    status:'dibatalkan',
    deleted_at:nowIso,
    deleted_by:currentUser.id,
    cancelled_at:nowIso,
    cancelled_by:currentUser.id,
    previous_status:req?.status || null,
    trash_expires_at:plusDaysIso(nowIso, 30)
  };
  const {error} = await hkSafeUpdateRequest(id, payload, {sender_id:currentUser.id});
  if(error){showToast('Gagal menghapus request: '+getErrorMessage(error),'error');return;}
  await cleanupNotificationsForHiddenRequest(id);
  showToast('Request dipindahkan ke Sampah dan disembunyikan dari penerima.','success');
  if(openRequestId===id) openRequestId = null;
  loadDashPage(currentDashPage);
};

          <div style="font-size:.75rem;color:var(--text-gray);font-weight:700">${escapeHtml(m.request?.request_code||'—')} · ${escapeHtml(m.request?.subject||'Request')}</div>
          <p style="font-size:.9rem;line-height:1.6;margin-top:.5rem;white-space:pre-wrap">${escapeHtml(m.original_message || m.message || 'Pesan telah dihapus')}</p>
          <div style="font-size:.75rem;color:var(--text-gray);margin-top:.5rem">Dihapus: ${fmtDt(m.deleted_at)}</div>
        </div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap;justify-content:flex-end">
          <button class="btn btn-success btn-sm" onclick="restoreDeletedChatMessage('${m.id}')">Pulihkan</button>
          <button class="btn btn-danger btn-sm" onclick="permanentDeleteChatMessage('${m.id}')">Hapus Permanen</button>
        </div>
      </div>
    </div>`).join('');
}
window.restoreDeletedRequest = async function(id) {
  const {data:req} = await sb.from('requests').select('previous_status,status').eq('id',id).eq('sender_id',currentUser.id).maybeSingle();
  const status = (req?.previous_status && req.previous_status !== 'dibatalkan') ? req.previous_status : 'menunggu_diproses';
  const {error} = await hkSafeUpdateRequest(id, {
    status,
    deleted_at:null,
    deleted_by:null,
    cancelled_at:null,
    cancelled_by:null,
    trash_expires_at:null,
    previous_status:null
  }, {sender_id:currentUser.id});
  if(error){showToast('Gagal memulihkan request: '+getErrorMessage(error),'error');return;}
  showToast('Request dipulihkan.', 'success');
  await loadSampahAll();
};
window.permanentDeleteRequest = async function(id) {
  if(!confirm('Hapus permanen request ini? Semua pesan/lampiran terkait bisa ikut terhapus dan tindakan ini tidak bisa dibatalkan.')) return;
  await cleanupNotificationsForHiddenRequest(id);
  const {error} = await sb.from('requests').delete().eq('id',id).eq('sender_id',currentUser.id);
  if(error){showToast('Gagal hapus permanen request: '+getErrorMessage(error),'error');return;}
  showToast('Request dihapus permanen.', 'success');
  await loadSampahAll();
};
// Kompatibilitas tombol refresh lama
window.loadDeletedChatMessages = async function() {
  const wrap = $('sampah-list') || $('deleted-chat-list');
  if(!wrap) return;
  sampahTab = 'chat';
  await loadDeletedChatMessagesFinal(wrap);
};

// FIX 6 — notifikasi bersih dari request hidden dan klik notif lama tidak membuka request sampah.
loadNotifCount = async function() {
  if(!currentUser) return;
  const {data} = await sb.from('notifications')
    .select('id,request_id,type,title,body,is_read')
    .eq('user_id', currentUser.id)
    .eq('is_read', false)
    .order('created_at', {ascending:false})
    .limit(100);
  const visible = await filterVisibleNotifications(data || []);
  const count = visible.length;
  const badge = $('notif-badge');
  if(badge){if(count>0){badge.classList.remove('hidden');badge.textContent=count>9?'9+':count;}else badge.classList.add('hidden');}
};
window.toggleNotifDropdown = async function(){
  const dd=$('notif-dropdown');
  if(!dd) return;
  if(!dd.classList.contains('hidden')){closeNotifDropdown();return;}
  dd.classList.remove('hidden'); notifDropOpen=true;
  const {data}=await sb.from('notifications')
    .select('*')
    .eq('user_id',currentUser.id)
    .order('created_at',{ascending:false})
    .limit(50);
  const notifs = await filterVisibleNotifications(data || []);
  dd.innerHTML=`<div class="notif-header"><h4>Notifikasi</h4><button onclick="markAllRead()">Tandai semua dibaca</button></div>
    <div class="notif-list">${notifs.length===0?'<div class="notif-empty">Tidak ada notifikasi</div>':
      notifs.slice(0,20).map(n=>`<div class="notif-item${n.is_read?'':' unread'}" onclick="onNotifClick('${n.id}','${n.request_id||''}')">
        <div class="notif-dot" style="${n.is_read?'background:var(--border)':''}"></div>
        <div><p>${escapeHtml(n.title||'Notifikasi')}</p><span>${escapeHtml(n.body||'')}</span><br><span style="font-size:.72rem">${timeAgo(n.created_at)}</span></div>
      </div>`).join('')}
    </div>`;
  await loadNotifCount();
};
window.onNotifClick = async function(nid,rid){
  await sb.from('notifications').update({is_read:true}).eq('id',nid).eq('user_id',currentUser.id);
  closeNotifDropdown(); loadNotifCount();
  if(rid && rid !== 'null' && rid !== 'undefined') {
    const req = await getRequestForNotifGuard(rid);
    if(requestHiddenFromNotification(req)) {
      await cleanupNotificationsForHiddenRequest(rid);
      showToast('Notifikasi ini sudah tidak berlaku karena request sudah dihapus/dibatalkan.', 'info');
      loadDashPage(currentDashPage);
      return;
    }
    openChat(rid);
  }
};

// FIX 7 — follow up/deadline tidak menyentuh request sampah/selesai.
checkFollowup = async function(){
  if(!currentUser) return;
  const uid=currentUser.id;
  const {data}=await sb.from('requests')
    .select('id,request_code,subject,due_date,status,sender_id,deleted_at')
    .eq('sender_id',uid)
    .is('deleted_at', null)
    .in('status', ACTIVE_REQUEST_STATUSES)
    .not('due_date','is',null);
  if(!data) return;
  const now=new Date();
  for(const r of data){
    if(!isActiveRequest(r)) continue;
    const due=new Date(r.due_date);
    if(Number.isNaN(due.getTime())) continue;
    if(due<now){
      await hkSafeUpdateRequest(r.id, {status:'terlambat'});
      const {data:ex}=await sb.from('notifications').select('id')
        .eq('user_id',uid).eq('request_id',r.id).eq('type','overdue')
        .gte('created_at',new Date(now.getTime()-3600000).toISOString()).maybeSingle();
      if(!ex) await sb.from('notifications').insert({user_id:uid,request_id:r.id,title:'Request Terlambat',body:`Request ${r.request_code}: "${r.subject}" telah melewati tenggat waktu.`,type:'overdue'});
    } else if((due-now)<86400000){
      const {data:ex}=await sb.from('notifications').select('id')
        .eq('user_id',uid).eq('request_id',r.id).eq('type','deadline_soon')
        .gte('created_at',new Date(now.getTime()-3600000).toISOString()).maybeSingle();
      if(!ex) await sb.from('notifications').insert({user_id:uid,request_id:r.id,title:'Request Mendekati Tenggat',body:`Request ${r.request_code}: "${r.subject}" akan jatuh tempo dalam kurang dari 24 jam.`,type:'deadline_soon'});
    }
  }
};

// ============================================================
// INIT
// ============================================================
async function init() {
  if(!sb) return;
  const {data:{session}}=await sb.auth.getSession();
  if(session?.user){
    currentUser=session.user;
    await loadProfile();
  }
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session?.user){
      currentUser=session.user;
      if(!currentProfile) await loadProfile();
    } else if(event==='SIGNED_OUT'){
      currentUser=null; currentProfile=null;
    }
  });
  render();
}
init();

</script>
